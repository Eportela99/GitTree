services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: it-toolbox-backend
    restart: unless-stopped
    environment:
      - GIN_MODE=release
    # NET_RAW is required for ICMP ping and raw socket operations
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # Docker socket for Docker Info tool (read-only for safety)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "8080"
    networks:
      - toolbox

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: it-toolbox-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - backend
    networks:
      - toolbox

networks:
  toolbox:
    driver: bridge
